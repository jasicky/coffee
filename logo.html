<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Brew Café Logo</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
        }
        .logo-container {
            text-align: center;
            padding: 30px;
            border: 3px solid #6F4E37;
            border-radius: 10px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
        }
        .coffee-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .brand-name {
            font-size: 32px;
            color: #6F4E37;
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: 2px;
        }
        .tagline {
            font-size: 14px;
            color: #8B7355;
            font-style: italic;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="coffee-icon">☕</div>
        <div class="brand-name">MORNING BREW</div>
        <div class="tagline">Crafted Coffee, Cozy Moments</div>
    </div>
</body>
</html>
